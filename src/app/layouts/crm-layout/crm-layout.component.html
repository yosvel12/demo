<div
    class="crm-layout"
    [class.card-borderd-theme]="themeService.isCardBorder()"
    [class.card-border-radius]="themeService.isCardBorderRadius()"
    [class.rtl-enabled]="themeService.isRTLEnabled()"
    [class.component-dark-theme]="themeService.isDark()"
>
    <div class="crm-shell">
        <header class="crm-topbar bg-white border-radius">
            <a routerLink="/crm" class="crm-brand d-flex align-items-center">
                <span class="crm-brand-icon d-inline-flex align-items-center justify-content-center">
                    <i class="material-symbols-outlined">hub</i>
                </span>
                <span>
                    <span class="crm-brand-title d-block fw-semibold">CRM Workspace</span>
                    <span class="crm-brand-subtitle d-block text-body">Clientes, leads y acuerdos</span>
                </span>
            </a>
            <nav class="crm-nav d-flex align-items-center">
                <a routerLink="/crm" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                    Dashboard
                </a>
                <a routerLink="/crm-page" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
                    Contactos
                </a>
                <a routerLink="/crm-page/customers" routerLinkActive="active">
                    Clientes
                </a>
                <a routerLink="/crm-page/leads" routerLinkActive="active">
                    Leads
                </a>
                <a routerLink="/crm-page/deals" routerLinkActive="active">
                    Deals
                </a>
            </nav>
            <div class="crm-actions d-flex align-items-center">
                <a routerLink="/crm-page/create-contact" class="crm-action-btn d-inline-flex align-items-center">
                    <i class="material-symbols-outlined">person_add</i>
                    Nuevo contacto
                </a>
            </div>
        </header>

        <main class="crm-main-content">
            <router-outlet />
        </main>
    </div>

    <!-- Customizer Settings -->
    <app-customizer-settings />
</div>
